name: flownote
description: "FlowNote - Personal Productivity & Finance Management App"
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage & Security
  shared_preferences: ^2.3.1

  # Navigation
  go_router: ^14.2.7

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  image_picker: ^1.1.2

  # Markdown
  flutter_markdown: ^0.7.3+1

  # Animations
  animate_do: ^3.3.4

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

